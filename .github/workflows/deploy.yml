name: CI/CD

# Push to main runs the test suite, then builds the image, pushes it to ECR,
# and triggers an App Runner deployment. A manual run is also allowed.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deployments of the same branch run at once.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ai-document-assistant-asoft
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:892217934322:service/ai-document-assistant-asoft/dbc7c0cac06e4a1e8121baac27b7f6d0

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest -q

  deploy:
    name: Build, push and deploy
    needs: test
    runs-on: ubuntu-latest
    # Deploy only on a real push to main, never on manual runs of other refs.
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write   # required for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # Single-manifest image (App Runner rejects the buildx attestation index).
          provenance: false
          sbom: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --region "$AWS_REGION"

      - name: Wait for deployment to finish
        run: |
          for i in $(seq 1 40); do
            status=$(aws apprunner describe-service \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --region "$AWS_REGION" \
              --query 'Service.Status' --output text)
            echo "Attempt $i: service status = $status"
            case "$status" in
              RUNNING) echo "Deployment complete."; exit 0 ;;
              CREATE_FAILED|DELETE_FAILED|PAUSED) echo "Service in bad state: $status"; exit 1 ;;
            esac
            sleep 15
          done
          echo "Timed out waiting for RUNNING."; exit 1
